spring:
  config:
    import: optional:file:services/gateway-service/.env[.properties]
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: ${EUREKA_CLIENT_ENABLED:false}
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@authRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        - id: main-service
          uri: ${MAIN_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/**
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@defaultRateLimiter}"
                key-resolver: "#{@userKeyResolver}"

        - id: chat-service
          uri: ${CHAT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/chat/**
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@chatRateLimiter}"
                key-resolver: "#{@userKeyResolver}"

        - id: search-service
          uri: ${SEARCH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/search/**
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@searchRateLimiter}"
                key-resolver: "#{@userKeyResolver}"

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@defaultRateLimiter}"
                key-resolver: "#{@userKeyResolver}"

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: '*'
            allowed-methods: GET,POST,PUT,DELETE,OPTIONS
            allowed-headers: '*'
            allow-credentials: true

# Rate Limiter Configuration
# per: SECOND | MINUTE | HOUR | DAY
# burst: max number of requests allowed in a spike
gateway:
  rate-limiter:
    auth:
      rate: 5
      per: MINUTE
      burst: 5
    general:
      rate: 30
      per: SECOND
      burst: 30
    search:
      rate: 15
      per: SECOND
      burst: 15
    chat:
      rate: 20
      per: SECOND
      burst: 20

server:
  port: 8081

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    org:
      springframework:
        cloud:
          gateway: INFO
    reactor:
      netty: INFO

---
# Docker/Production Profile
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: api-gateway